syntax = "proto3";

package nova.sensor.v1;

// --------------------------------------------------------------------------
// Telemetry event streaming
// --------------------------------------------------------------------------

service SensorService {
  // Stream telemetry events from the eBPF sensor.
  rpc StreamEvents(StreamEventsRequest) returns (stream SensorEvent);

  // Get current sensor status.
  rpc GetStatus(GetSensorStatusRequest) returns (SensorStatus);

  // Control which eBPF programs are loaded.
  rpc LoadProgram(LoadProgramRequest) returns (LoadProgramResponse);

  // Unload an eBPF program.
  rpc UnloadProgram(UnloadProgramRequest) returns (UnloadProgramResponse);
}

// --------------------------------------------------------------------------
// Messages
// --------------------------------------------------------------------------

message StreamEventsRequest {
  // Optional filter by event type (empty = all events).
  repeated EventType event_types = 1;
  // Optional filter by sandbox ID.
  string sandbox_id = 2;
}

message SensorEvent {
  // Event type discriminator.
  EventType event_type = 1;
  // Timestamp in nanoseconds since boot.
  uint64 timestamp_ns = 2;
  // Process ID that triggered the event.
  uint32 pid = 3;
  // Thread ID.
  uint32 tid = 4;
  // User ID.
  uint32 uid = 5;
  // Command name (max 16 chars).
  string comm = 6;
  // Sandbox ID this event belongs to (if applicable).
  string sandbox_id = 7;
  // Event-specific payload (JSON-encoded).
  bytes payload = 8;
}

message GetSensorStatusRequest {}

message SensorStatus {
  // Number of loaded eBPF programs.
  uint32 loaded_programs = 1;
  // Total events processed since startup.
  uint64 total_events = 2;
  // Events dropped due to ring buffer overflow.
  uint64 dropped_events = 3;
  // Per-program status.
  repeated ProgramStatus programs = 4;
}

message ProgramStatus {
  // Program name.
  string name = 1;
  // Whether the program is currently attached.
  bool attached = 2;
  // Attach type (tracepoint, kprobe, uprobe).
  string attach_type = 3;
  // Attach target (e.g. "syscalls/sys_enter_execve").
  string attach_target = 4;
  // Events generated by this program.
  uint64 event_count = 5;
}

message LoadProgramRequest {
  // Program name identifier.
  string name = 1;
  // ELF bytecode of the eBPF program.
  bytes bytecode = 2;
  // Attach type.
  string attach_type = 3;
  // Attach target.
  string attach_target = 4;
}

message LoadProgramResponse {
  bool success = 1;
  string error_message = 2;
}

message UnloadProgramRequest {
  string name = 1;
}

message UnloadProgramResponse {
  bool success = 1;
  string error_message = 2;
}

// --------------------------------------------------------------------------
// Enums
// --------------------------------------------------------------------------

enum EventType {
  EVENT_TYPE_UNKNOWN = 0;
  EVENT_TYPE_PROCESS_EXEC = 1;
  EVENT_TYPE_PROCESS_EXIT = 2;
  EVENT_TYPE_PROCESS_FORK = 3;
  EVENT_TYPE_FILE_OPEN = 4;
  EVENT_TYPE_FILE_WRITE = 5;
  EVENT_TYPE_FILE_UNLINK = 6;
  EVENT_TYPE_NET_CONNECT = 7;
  EVENT_TYPE_NET_ACCEPT = 8;
  EVENT_TYPE_NET_CLOSE = 9;
  EVENT_TYPE_HTTP_REQUEST = 10;
  EVENT_TYPE_HTTP_RESPONSE = 11;
  EVENT_TYPE_DNS_QUERY = 12;
}
